<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="ra.css"> <!-- Ensure the path is correct -->
</head>
<body>
    <!-- Dashboard Section -->
    <section id="dashboard" class="section">
        <div class="dashboard">
            <h2>Parking Analytics Dashboard</h2>
            <div class="stats-container">
                <div class="stat-card">
                    <h3>Current Occupancy Rate</h3>
                    <p id="occupancy-rate">0%</p>
                </div>
                <div class="stat-card">
                    <h3>Peak Hour Traffic</h3>
                    <p id="peak-hour">N/A</p>
                </div>
                <div class="stat-card">
                    <h3>Average Stay Duration</h3>
                    <p id="average-duration">0h</p>
                </div>
                <div class="stat-card">
                    <h3>Today's Revenue</h3>
                    <p id="daily-revenue">$0</p>
                </div>
            </div>

            <div class="charts-grid">
                <div class="chart-container">
                    <h3>Hourly Parking Trend</h3>
                    <canvas id="hourlyTrendChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Vehicle Type Distribution</h3>
                    <canvas id="vehicleTypeChart"></canvas>
                </div>
            </div>

            <div class="chart-container full-width">
                <h3>Parking Spot Details</h3>
                <table class="dashboard-table">
                    <thead>
                        <tr>
                            <th>Spot ID</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Duration</th>
                            <th>Vehicle</th>
                            <th>Revenue</th>
                        </tr>
                    </thead>
                    <tbody id="parking-details">
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>
        </div>
    </section>
    <script src="dash.js"></script> <!-- Corrected script tag -->
</body>
</html>
