<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="XX4hPwv3MLlExDokvccOsb_7M6vrn_qYyE4S0lgyYmw" />
    
    <!-- Full SEO Tags -->
    <meta name="description" content="Reserve your parking spot securely with Smart Parking System. Easy and quick online reservations.">
    <meta name="keywords" content="reserve parking spot, online parking booking, smart parking reservations">
    <meta name="author" content="Smart Parking">
    <meta name="robots" content="index, follow">
    
    <!-- GEO Tags -->
    <meta name="geo.region" content="IN-AP">
    <meta name="geo.placename" content="Andhra Pradesh">
    <meta name="geo.position" content="15.9129;79.7400">
    <meta name="ICBM" content="15.9129, 79.7400">

    <title>Smart Parking Reservation</title>
    <link rel="stylesheet" href="Reservations.css">
</head>
<body>
    <header>
        <h1>🚗 Smart Parking System</h1>
    </header>
    <main>
        <section id="reservation-form">
            <h2>Reserve Your Parking Spot</h2>
            <form action="/submit-reservation" method="post">
                <div class="input-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="date">Date:</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="input-group">
                    <label for="time">Time:</label>
                    <input type="time" id="time" name="time" required>
                </div>

                <div class="input-group">
                    <label for="vehicle">Vehicle Type:</label>
                    <select id="vehicle" name="vehicle" required>
                        <option value="">Select a vehicle</option>
                        <option value="car">🚗 Car</option>
                        <option value="motorcycle">🏍️ Motorcycle</option>
                        <option value="truck">🚛 Truck</option>
                    </select>
                </div>

                <button type="submit">Confirm Reservation</button>
            </form>
        </section>
    </main>
    <script src="Reservations.js"></script>
    <footer>
        <p>&copy; 2025 Smart Parking System | All Rights Reserved</p>
    </footer>
</body>
</html>
